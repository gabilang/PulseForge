<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="pf-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="pf-spark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.6" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Icon badge: a pulse waveform "forged" with a spark -->
  <rect x="10" y="20" width="80" height="80" rx="18" fill="url(#pf-badge)"/>
  <path d="M22 60 H38 L44 42 L52 78 L58 52 L63 60 H78"
        fill="none" stroke="url(#pf-spark)" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="78" cy="60" r="3.6" fill="#f97316"/>

  <!-- Wordmark -->
  <text x="108" y="62" font-size="38" font-weight="700" letter-spacing="0.5">
    <tspan fill="#1e293b">Pulse</tspan><tspan fill="#f97316">Forge</tspan>
  </text>
  <text x="110" y="86" font-size="14.5" font-weight="500" fill="#64748b" letter-spacing="2.2">
    BIOSIGNAL PROCESSING SUITE
  </text>
</svg>
